<svg xmlns="http://www.w3.org/2000/svg" width="280" height="54" viewBox="0 0 280 54">
  <!-- Outer container with subtle shadow -->
  <defs>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="116%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#000" flood-opacity="0.1"/>
    </filter>
  </defs>
  <rect x="1" y="1" width="278" height="52" rx="12" ry="12" fill="white" stroke="#e5e5e5" stroke-width="1" filter="url(#shadow)"/>
  <!-- Left section: Rebyte logo in gold circle -->
  <circle cx="32" cy="27" r="18" fill="#D4A654"/>
  <g transform="translate(17, 14) scale(0.06)">
    <rect x="45" y="20" width="410" height="300" rx="50" ry="50" fill="white"/>
    <rect x="20" y="380" width="460" height="40" rx="20" ry="20" fill="white"/>
    <ellipse cx="195" cy="155" rx="32" ry="72" fill="#D4A654"/>
    <ellipse cx="305" cy="155" rx="32" ry="72" fill="#D4A654"/>
  </g>
  <!-- Divider line -->
  <line x1="56" y1="10" x2="56" y2="44" stroke="#e5e5e5" stroke-width="1"/>
  <!-- Text -->
  <text x="66" y="22" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="10" font-weight="500" fill="#999" letter-spacing="0.5">RUN THIS SKILL ON</text>
  <text x="66" y="40" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="18" font-weight="700" fill="#1a1a1a">Rebyte</text>
</svg>
